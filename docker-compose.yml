version: '3.8'
services:
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: shipping_portal
      POSTGRES_USER: dev
      POSTGRES_PASSWORD: devpassword
    ports:
      - '5432:5432'
    volumes:
      - pgdata:/var/lib/postgresql/data

  api:
    build: ./packages/api
    ports:
      - '3001:3001'
    env_file: .env
    depends_on: [postgres]
    volumes:
      - ./packages/api:/app
      - /app/node_modules
    command: npm run dev

  admin:
    build: ./packages/admin-dashboard
    ports:
      - '5173:5173'
    volumes:
      - ./packages/admin-dashboard:/app
      - /app/node_modules
    command: npm run dev -- --host

  checkout:
    build: ./packages/checkout-widget
    ports:
      - '5174:5174'
    volumes:
      - ./packages/checkout-widget:/app
      - /app/node_modules
    command: npm run dev -- --host --port 5174

volumes:
  pgdata:
